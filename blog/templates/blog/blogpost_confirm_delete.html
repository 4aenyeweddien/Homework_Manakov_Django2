{% extends 'catalog/home.html' %}

{% block title %}Удаление записи{% endblock %}

{% block content %}
<h1>Удаление записи</h1>
<p>Вы уверены, что хотите удалить "{{ object }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Удалить</button>
    <a href="{% url 'blog:blogpost_detail' object.pk %}">Отмена</a>
</form>
{% endblock %}
